services:
  postgres:
    image: postgres:16.12-bookworm
    #container_name: pg-server
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pg_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pg_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./dumps:/var/lib/postgresql/dumps

  app:
    build: .
    container_name: source-data-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pg_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      INTERVAL: 10  # Интервал запуска скрипта (в секундах)
    ports:
      - "5000:5000"

volumes:
  data:
  dumps: